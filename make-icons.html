<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>生成图标</title></head>
<body style="background:#5D9CEC;display:flex;gap:20px;padding:40px">
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
[['c192',192],['c512',512]].forEach(([id,s])=>{
  const c=document.getElementById(id),ctx=c.getContext('2d');
  c.width=s;c.height=s;
  ctx.fillStyle='#5D9CEC';ctx.beginPath();ctx.roundRect?ctx.roundRect(0,0,s,s,36):ctx.rect(0,0,s,s);ctx.fill();
  ctx.fillStyle='#fff';ctx.font=`bold ${s*.45}px system-ui,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('轻',s/2,s/2);
  console.log(id+' dataURL:', c.toDataURL('image/png'));
});
</script>
</body>
</html>
